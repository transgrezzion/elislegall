<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Eli’s Legal Enterprise | Legal Intelligence & Research Kenya</title>
    <meta name="description" content="Eli's Legal Enterprise provides expert legal research, paralegal services, and strategic drafting in Kitengela, Kajiado. Specialized in Kenyan Civil Procedure and the 2010 Constitution.">
    <meta name="keywords" content="Legal Intelligence Kenya, Paralegal Services Kitengela, Kenyan Law Research, Eli's Legal Enterprise, Kajiado Legal Hub, Constitution of Kenya 2010, Legal Drafting Kenya">
    <meta name="author" content="Eli's Legal Enterprise">

    <meta property="og:title" content="Eli’s Legal Enterprise | Legal Intelligence. Refined.">
    <meta property="og:description" content="Professional legal research hub dedicated to analyzing the Kenyan legal atmosphere. Based in Kitengela.">
    <meta property="og:url" content="https://transgrezzion.github.io/elislegall/">
    <meta property="og:type" content="website">
    
    <link rel="canonical" href="https://transgrezzion.github.io/elislegall/">

    <style>
        :root {
            --primary-navy: #1a2a6c;
            --accent-gold: #c5a059;
            --light-grey: #f4f4f4;
            --text-dark: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            color: var(--text-dark);
            scroll-behavior: smooth;
        }

        /* SEO Friendly visually hidden H1 */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        header {
            background: var(--white);
            padding: 1.5rem 5%;
            border-bottom: 3px solid var(--primary-navy);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-name {
            font-size: 1.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
            color: var(--primary-navy);
            text-decoration: none;
            font-weight: bold;
        }

        nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.85rem;
            margin-left: 20px;
            text-transform: uppercase;
        }

        .hero {
            background: linear-gradient(rgba(26, 42, 108, 0.8), rgba(26, 42, 108, 0.8)), 
                        url('https://images.unsplash.com/photo-1589829545856-d10d557cf95f?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 8rem 10%;
            text-align: center;
        }

        .hero h2 { font-size: 3rem; margin-bottom: 1rem; }

        .content-section {
            padding: 4rem 10%;
            background: var(--white);
        }

        .article-card {
            background: var(--white);
            border: 1px solid #ddd;
            padding: 2rem;
            margin-bottom: 2rem;
            border-left: 5px solid var(--accent-gold);
        }

        .article-card h3 { color: var(--primary-navy); margin-top: 0; }
        
        .sources-footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--accent-gold);
            font-size: 0.85rem;
            color: #666;
            line-height: 1.8;
        }

        .functions {
            padding: 4rem 10%;
            text-align: center;
            background: var(--light-grey);
        }

        .functions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .func-item h4 {
            color: var(--primary-navy);
            border-bottom: 2px solid var(--accent-gold);
            display: inline-block;
            padding-bottom: 5px;
        }

        .portal-cta {
            background: var(--primary-navy);
            color: white;
            padding: 5rem 5%;
            text-align: center;
        }

        .btn {
            background: var(--accent-gold);
            color: white;
            padding: 1rem 3rem;
            text-decoration: none;
            display: inline-block;
            margin-top: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover { background: #b08d4a; transform: translateY(-2px); }

        footer {
            background: #111;
            color: #ccc;
            padding: 4rem 5% 2rem;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
        }

        .footer-section h3 {
            color: var(--accent-gold);
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .footer-section p, .footer-section a {
            color: #ccc;
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .footer-section a:hover { color: var(--accent-gold); }

        .copyright {
            text-align: center;
            border-top: 1px solid #333;
            margin-top: 3rem;
            padding-top: 2rem;
            font-size: 0.8rem;
        }
    </style>
</head>
